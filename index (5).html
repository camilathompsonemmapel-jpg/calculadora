<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Financiero — Cami & Juan</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #F1F5F9; }
    #app { width: 100%; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel">
const { useState, useEffect } = React;

// ════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════
const STORAGE_FUNDS = "fondos_cami_v1";
const STORAGE_CONFIG = "config_cami_v1";
const DEFAULT_TC = 1420;
const DEFAULT_EUR = 1560;
const DEFAULT_BRL = 265;
const DEFAULT_PYG = 0.19;

const PALETTE = ["#10B981","#0EA5E9","#F59E0B","#8B5CF6","#EF4444","#F97316","#06B6D4","#EC4899"];
const DEFAULT_FUNDS = [
  { id:"casita-001", name:"Casita",     emoji:"🏠", color:"#10B981", current:640000,  goalType:"usd",   goalUSD:80000,   goalPesos:null,    notes:"Construcción en Goya — Meta: USD 80.000" },
  { id:"auto-001",   name:"Auto Nuevo", emoji:"🚗", color:"#0EA5E9", current:0,        goalType:"pesos", goalPesos:3600000, goalUSD:null,    notes:"Cambio antes de 2028 · $150K/mes" },
  { id:"viaje-001",  name:"Viaje 2026", emoji:"✈️", color:"#F59E0B", current:1282645, goalType:"pesos", goalPesos:1282645, goalUSD:null,    notes:"¡Fondo completo!" },
  { id:"emerg-001",  name:"Emergencia", emoji:"🛡️", color:"#8B5CF6", current:0,        goalType:"pesos", goalPesos:5600000, goalUSD:null,    notes:"3 meses de gastos fijos" },
];

const T = { bg:"#F1F5F9", surface:"#FFFFFF", surface2:"#F8FAFC", border:"#E2E8F0", text:"#0F172A", text2:"#64748B", text3:"#94A3B8" };

// ════════════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════════════
const fmt$ = (n) => "$" + Math.round(n).toLocaleString("es-AR");
const fmtUSD = (n) => "USD " + Math.round(n).toLocaleString("es-AR");
const fmtDec = (n,d=2) => n.toLocaleString("es-AR",{minimumFractionDigits:d,maximumFractionDigits:d});
const parseAmt = (s) => parseFloat(String(s).replace(/\./g,"").replace(",",".")) || 0;
const parseNum = (s) => parseFloat(String(s).replace(",",".")) || 0;
const fmtTC = (n) => n < 1 ? n.toFixed(4) : Math.round(n).toLocaleString("es-AR");

// Storage wrapper
const storage = {
  get: (key) => {
    try {
      const val = localStorage.getItem(key);
      return val ? { value: val } : null;
    } catch { return null; }
  },
  set: (key, val) => {
    try {
      localStorage.setItem(key, val);
      return { value: val };
    } catch { return null; }
  },
};

// ════════════════════════════════════════════════════════════════
//  CONVERSOR RÁPIDO
// ════════════════════════════════════════════════════════════════
function ConversorRapido({ tc, setTc, tcEUR, setTcEUR, tcBRL, setTcBRL, tcPYG, setTcPYG }) {
  const [open, setOpen] = useState(true);
  const [amts, setAmts] = useState({ USD:"", EUR:"", BRL:"", PYG:"" });

  const CURRENCIES = [
    { key:"USD", flag:"🇺🇸", name:"Dólar",   sym:"USD", tc,    setTc,       color:"#10B981" },
    { key:"EUR", flag:"🇪🇺", name:"Euro",    sym:"EUR", tc:tcEUR, setTc:setTcEUR, color:"#0EA5E9" },
    { key:"BRL", flag:"🇧🇷", name:"Real",    sym:"BRL", tc:tcBRL, setTc:setTcBRL, color:"#F59E0B" },
    { key:"PYG", flag:"🇵🇾", name:"Guaraní", sym:"PYG", tc:tcPYG, setTc:setTcPYG, color:"#8B5CF6" },
  ];

  return (
    <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:16, marginTop:4 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:open?14:0 }}>
        <span style={{ color:T.text2, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.1em" }}>
          💱 Conversor rápido
        </span>
        <button onClick={()=>setOpen(!open)} style={{ background:"transparent", border:`1px solid ${T.border}`, color:T.text2, cursor:"pointer", fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:99 }}>
          {open ? "Ocultar ▲" : "Mostrar ▼"}
        </button>
      </div>

      {open && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))", gap:10 }}>
          {CURRENCIES.map(({ key, flag, name, sym, tc:cTc, setTc:cSet, color }) => {
            const amt = parseAmt(amts[key]);
            const pesos = amt * cTc;
            return (
              <div key={key} style={{ background:T.bg, borderRadius:12, padding:"12px 14px", border:`1px solid ${T.border}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:9 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:18, lineHeight:1 }}>{flag}</span>
                    <span style={{ color:T.text, fontWeight:700, fontSize:13 }}>{name}</span>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:1, background:"rgba(0,0,0,0.05)", borderRadius:6, padding:"3px 7px" }}>
                    <span style={{ color:T.text3, fontSize:9, fontWeight:700 }}>$</span>
                    <input
                      type="number"
                      value={cTc}
                      onChange={e=>cSet(parseFloat(e.target.value)||0)}
                      style={{ width:cTc<1?44:54, background:"transparent", border:"none", outline:"none", color:T.text2, fontSize:10, fontWeight:700, textAlign:"right" }}
                    />
                    <span style={{ color:T.text3, fontSize:9, fontWeight:700 }}>/{sym}</span>
                  </div>
                </div>
                <input
                  type="text"
                  value={amts[key]}
                  onChange={e=>setAmts({...amts,[key]:e.target.value})}
                  placeholder={`Importe en ${sym}…`}
                  style={{ width:"100%", background:"#FFF", border:`1px solid ${T.border}`, borderRadius:9, fontSize:14, padding:"9px 12px", marginBottom:8, outline:"none", color:T.text, boxSizing:"border-box" }}
                />
                {amt > 0 ? (
                  <div style={{ background:`${color}10`, borderRadius:9, padding:"9px 12px", border:`1px solid ${color}28` }}>
                    <div style={{ color:T.text, fontSize:20, fontWeight:800, letterSpacing:"-0.3px" }}>{fmt$(pesos)}</div>
                    <div style={{ color:T.text3, fontSize:10, marginTop:2 }}>
                      {amt.toLocaleString("es-AR")} {sym} × ${fmtTC(cTc)}
                    </div>
                  </div>
                ) : (
                  <div style={{ height:50, borderRadius:9, background:"rgba(0,0,0,0.02)", border:`1.5px dashed ${T.border}`, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <span style={{ color:T.text3, fontSize:11 }}>Ingresá un importe</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  PROGRESS BAR
// ════════════════════════════════════════════════════════════════
function ProgressBar({pct,color}){
  const [w,setW]=useState(0);
  useEffect(()=>{ const t=setTimeout(()=>setW(Math.min(pct,100)),120); return()=>clearTimeout(t); },[pct]);
  const done=pct>=100;
  return(
    <div style={{height:8,borderRadius:99,background:"rgba(0,0,0,0.07)",overflow:"hidden"}}>
      <div style={{width:`${w}%`,height:"100%",borderRadius:99,transition:"width 1.1s cubic-bezier(0.4,0,0.2,1)",background:done?"linear-gradient(90deg,#16A34A,#4ADE80)":`linear-gradient(90deg,${color}90,${color})`}}/>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  FUND CARD
// ════════════════════════════════════════════════════════════════
function getGoalPesos(fund,tc){ return fund.goalType==="usd"&&fund.goalUSD ? fund.goalUSD*tc : fund.goalPesos||0; }

function FundCard({fund,tc,onDeposit,onEdit,onDelete}){
  const goalPesos=getGoalPesos(fund,tc), pct=goalPesos>0?(fund.current/goalPesos*100):0;
  const falta=Math.max(0,goalPesos-fund.current), done=pct>=100;
  const [askDel,setAskDel]=useState(false);
  return(
    <div style={{background:"#FFF",borderRadius:16,padding:"20px",border:`1px solid ${T.border}`,borderTop:`3px solid ${fund.color}`,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:24,lineHeight:1}}>{fund.emoji}</span>
          <div>
            <div style={{color:T.text,fontWeight:700,fontSize:15}}>{fund.name}</div>
            {fund.notes&&<div style={{color:T.text3,fontSize:11,marginTop:2,maxWidth:185,lineHeight:1.35}}>{fund.notes}</div>}
          </div>
        </div>
        <span style={{padding:"3px 10px",borderRadius:99,fontSize:12,fontWeight:700,whiteSpace:"nowrap",marginLeft:8,background:done?"#DCFCE7":`${fund.color}12`,color:done?"#16A34A":fund.color,border:`1px solid ${done?"#BBF7D0":fund.color+"35"}`}}>{done?"✓ Meta":`${Math.round(pct)}%`}</span>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{color:T.text,fontSize:25,fontWeight:800,letterSpacing:"-0.5px",lineHeight:1}}>{fmt$(fund.current)}</div>
        <div style={{color:T.text2,fontSize:12,marginTop:4}}>{fmtUSD(fund.current/tc)}{fund.goalType==="usd"&&fund.goalUSD?<span style={{color:fund.color,marginLeft:8}}>· Meta: {fmtUSD(fund.goalUSD)}</span>:null}</div>
      </div>
      <div style={{marginBottom:12}}>
        <ProgressBar pct={pct} color={fund.color}/>
        <div style={{marginTop:6,fontSize:11}}>{done?<span style={{color:"#16A34A",fontWeight:600}}>🎉 ¡Objetivo alcanzado!</span>:<span style={{color:T.text2}}>Falta {fmt$(falta)} · {fmtUSD(falta/tc)}{fund.goalType==="pesos"&&goalPesos>0?<span style={{color:T.text3}}> · Meta: {fmt$(goalPesos)}</span>:null}</span>}</div>
      </div>
      {!askDel?(
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onDeposit(fund)} style={{flex:1,padding:"7px 0",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",background:`${fund.color}12`,color:fund.color,border:`1px solid ${fund.color}30`}}>+ Depositar</button>
          <button onClick={()=>onEdit(fund)} style={{padding:"7px 11px",borderRadius:9,fontSize:13,cursor:"pointer",background:T.surface2,color:T.text2,border:`1px solid ${T.border}`}}>✏️</button>
          <button onClick={()=>setAskDel(true)} style={{padding:"7px 11px",borderRadius:9,fontSize:13,cursor:"pointer",background:"#FFF1F2",color:"#E11D48",border:"1px solid #FECDD3"}}>🗑</button>
        </div>
      ):(
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{color:T.text2,fontSize:12,flex:1}}>¿Eliminar este fondo?</span>
          <button onClick={()=>{onDelete(fund.id);setAskDel(false);}} style={{padding:"7px 13px",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",background:"#FFF1F2",color:"#E11D48",border:"1px solid #FECDD3"}}>Sí</button>
          <button onClick={()=>setAskDel(false)} style={{padding:"7px 13px",borderRadius:9,fontSize:13,cursor:"pointer",background:T.surface2,color:T.text2,border:`1px solid ${T.border}`}}>No</button>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  MAIN APP
// ════════════════════════════════════════════════════════════════
export default function App(){
  const [funds,setFunds]=useState(DEFAULT_FUNDS);
  const [tc,setTc]=useState(DEFAULT_TC);
  const [tcEUR,setTcEUR]=useState(DEFAULT_EUR);
  const [tcBRL,setTcBRL]=useState(DEFAULT_BRL);
  const [tcPYG,setTcPYG]=useState(DEFAULT_PYG);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("Fondos");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});

  // Cargar datos
  useEffect(()=>{
    try{
      const fr=storage.get(STORAGE_FUNDS);
      const cr=storage.get(STORAGE_CONFIG);
      if(fr?.value) setFunds(JSON.parse(fr.value));
      if(cr?.value){
        const c=JSON.parse(cr.value);
        if(c.tc)    setTc(c.tc);
        if(c.tcEUR) setTcEUR(c.tcEUR);
        if(c.tcBRL) setTcBRL(c.tcBRL);
        if(c.tcPYG) setTcPYG(c.tcPYG);
      }
    }catch(e){}
    finally{setLoading(false);}
  },[]);

  // Guardar fondos
  useEffect(()=>{ if(!loading) storage.set(STORAGE_FUNDS, JSON.stringify(funds)); },[funds,loading]);

  // Guardar config (TC)
  useEffect(()=>{ if(!loading) storage.set(STORAGE_CONFIG, JSON.stringify({tc,tcEUR,tcBRL,tcPYG})); },[tc,tcEUR,tcBRL,tcPYG,loading]);

  const totalAcum=funds.reduce((s,f)=>s+f.current,0);

  const doDeposit=()=>{ const amt=parseAmt(form.amount);if(amt>0){setFunds(p=>p.map(f=>f.id===modal.fund.id?{...f,current:f.current+amt}:f));setModal(null);} };
  const doWithdraw=()=>{ const amt=parseAmt(form.withdraw);if(amt>0){setFunds(p=>p.map(f=>f.id===modal.fund.id?{...f,current:Math.max(0,f.current-amt)}:f));setModal(null);} };
  const doSave=()=>{
    const gn=parseAmt(form.goalValue);if(!form.name||gn<=0)return;
    const data={name:form.name,emoji:form.emoji||"💰",color:form.color||"#10B981",notes:form.notes||"",goalType:form.goalType||"pesos",goalUSD:form.goalType==="usd"?gn:null,goalPesos:form.goalType==="pesos"?gn:null};
    if(modal.type==="add") setFunds(p=>[...p,{...data,id:`f_${Date.now()}`,current:0}]);
    else setFunds(p=>p.map(f=>f.id===modal.fund.id?{...f,...data}:f));
    setModal(null);
  };
  const openDeposit=(fund)=>{ setForm({amount:"",withdraw:""});setModal({type:"deposit",fund}); };
  const openEdit=(fund)=>{ setForm({name:fund.name,emoji:fund.emoji,color:fund.color,notes:fund.notes||"",goalType:fund.goalType,goalValue:fund.goalType==="usd"?String(fund.goalUSD??""):String(fund.goalPesos??"")}); setModal({type:"edit",fund}); };
  const openAdd=()=>{ setForm({name:"",emoji:"💰",color:"#10B981",notes:"",goalType:"pesos",goalValue:""});setModal({type:"add"}); };

  if(loading) return <div style={{background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#0EA5E9",fontSize:15,fontWeight:600}}>Cargando...</div></div>;

  const lS = { display:"block",color:T.text2,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6,marginTop:14 };
  const iBase = { width:"100%",background:T.surface2,border:`1px solid ${T.border}`,borderRadius:9,padding:"11px 14px",color:T.text,fontSize:15,outline:"none",boxSizing:"border-box" };

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,-apple-system,sans-serif"}}>

      {/* ── Header ── */}
      <div style={{background:"#FFF",borderBottom:`1px solid ${T.border}`,padding:"20px 20px 0"}}>
        <div style={{maxWidth:780,margin:"0 auto"}}>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:16}}>
            <div>
              <div style={{color:T.text3,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Cami &amp; Juan · Tracker Financiero</div>
              <div style={{color:T.text,fontSize:28,fontWeight:800,letterSpacing:"-0.5px"}}>{fmt$(totalAcum)}</div>
              <div style={{color:T.text2,fontSize:12,marginTop:3}}>{fmtUSD(totalAcum/tc)} en fondos activos</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              <div style={{color:T.text3,fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Dólar Blue</div>
              <div style={{display:"flex",alignItems:"center",background:"#FFFBEB",borderRadius:10,padding:"7px 12px",border:"1px solid #FDE68A",gap:4}}>
                <span style={{color:"#B45309",fontWeight:700,fontSize:14}}>$</span>
                <input type="number" value={tc} onChange={e=>setTc(Number(e.target.value))} style={{background:"transparent",border:"none",outline:"none",color:"#B45309",fontWeight:700,fontSize:16,width:88,textAlign:"right"}}/>
              </div>
            </div>
          </div>

          {/* ── CONVERSOR RÁPIDO ── */}
          <ConversorRapido
            tc={tc} setTc={setTc}
            tcEUR={tcEUR} setTcEUR={setTcEUR}
            tcBRL={tcBRL} setTcBRL={setTcBRL}
            tcPYG={tcPYG} setTcPYG={setTcPYG}
          />

          {/* Tabs */}
          <div style={{display:"flex",gap:2,marginTop:16}}>
            {["Fondos"].map(t=>(<button key={t} onClick={()=>setTab(t)} style={{padding:"9px 18px",borderRadius:"9px 9px 0 0",fontWeight:600,fontSize:13,cursor:"pointer",border:"none",transition:"all 0.15s",background:tab===t?T.bg:"transparent",color:tab===t?T.text:T.text2,borderTop:tab===t?"2px solid #0EA5E9":"2px solid transparent"}}>{t}</button>))}
          </div>
        </div>
      </div>

      {/* ── Contenido ── */}
      <div style={{maxWidth:780,margin:"0 auto",padding:"24px 20px"}}>
        {tab==="Fondos"&&(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {funds.map(f=><FundCard key={f.id} fund={f} tc={tc} onDeposit={openDeposit} onEdit={openEdit} onDelete={id=>setFunds(p=>p.filter(x=>x.id!==id))}/>)}
          <button onClick={openAdd} style={{background:"transparent",border:`2px dashed ${T.border}`,borderRadius:16,padding:"36px 20px",cursor:"pointer",color:T.text3,fontSize:14,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:8,transition:"all 0.2s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#0EA5E9";e.currentTarget.style.color="#0EA5E9";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.text3;}}>
            <span style={{fontSize:22}}>＋</span><span>Nuevo fondo</span>
          </button>
        </div>)}
      </div>

      {/* ── Modal Depositar ── */}
      {modal?.type==="deposit"&&(
        <div onClick={e=>e.target===e.currentTarget&&setModal(null)} style={{position:"fixed",inset:0,zIndex:200,background:"rgba(15,23,42,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#FFF",borderRadius:18,padding:"24px",width:"100%",maxWidth:400,border:`1px solid ${T.border}`,borderTop:`3px solid ${modal.fund.color}`,boxShadow:"0 20px 40px rgba(0,0,0,0.14)",maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{margin:0,color:T.text,fontSize:17,fontWeight:700}}>{modal.fund.emoji} {modal.fund.name}</h3>
              <button onClick={()=>setModal(null)} style={{background:T.surface2,border:`1px solid ${T.border}`,color:T.text2,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15}}>✕</button>
            </div>
            <label style={lS}>Agregar al fondo ($)</label>
            <input autoFocus type="text" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="Ej: 150000" style={iBase} onKeyDown={e=>e.key==="Enter"&&doDeposit()}/>
            {form.amount&&parseAmt(form.amount)>0&&<div style={{color:T.text2,fontSize:12,marginTop:6}}>≈ {fmtUSD(parseAmt(form.amount)/tc)}</div>}
            <button onClick={doDeposit} style={{width:"100%",marginTop:14,padding:13,borderRadius:10,background:modal.fund.color,color:"#FFF",border:"none",fontWeight:700,fontSize:15,cursor:"pointer"}}>Agregar</button>
            <div style={{borderTop:`1px solid ${T.border}`,margin:"18px 0 0"}}/>
            <label style={{...lS,marginTop:16}}>Retirar del fondo ($)</label>
            <input type="text" value={form.withdraw} onChange={e=>setForm({...form,withdraw:e.target.value})} placeholder="Ej: 50000" style={iBase} onKeyDown={e=>e.key==="Enter"&&doWithdraw()}/>
            {form.withdraw&&parseAmt(form.withdraw)>0&&<div style={{color:T.text2,fontSize:12,marginTop:6}}>≈ {fmtUSD(parseAmt(form.withdraw)/tc)}</div>}
            <button onClick={doWithdraw} style={{width:"100%",marginTop:12,padding:11,borderRadius:10,background:"#FFF1F2",color:"#E11D48",border:"1px solid #FECDD3",fontWeight:600,fontSize:14,cursor:"pointer"}}>Retirar</button>
          </div>
        </div>
      )}

      {/* ── Modal Editar/Crear ── */}
      {(modal?.type==="edit"||modal?.type==="add")&&(
        <div onClick={e=>e.target===e.currentTarget&&setModal(null)} style={{position:"fixed",inset:0,zIndex:200,background:"rgba(15,23,42,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#FFF",borderRadius:18,padding:"24px",width:"100%",maxWidth:400,border:`1px solid ${T.border}`,borderTop:`3px solid ${form.color||"#0EA5E9"}`,boxShadow:"0 20px 40px rgba(0,0,0,0.14)",maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{margin:0,color:T.text,fontSize:17,fontWeight:700}}>{modal.type==="add"?"Nuevo fondo":`Editar ${modal.fund?.name}`}</h3>
              <button onClick={()=>setModal(null)} style={{background:T.surface2,border:`1px solid ${T.border}`,color:T.text2,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"64px 1fr",gap:10}}>
              <div><label style={lS}>Emoji</label><input type="text" value={form.emoji} onChange={e=>setForm({...form,emoji:e.target.value})} style={{...iBase,textAlign:"center",fontSize:22}} maxLength={2}/></div>
              <div><label style={lS}>Nombre</label><input type="text" placeholder="Casita, Auto..." value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={iBase}/></div>
            </div>
            <label style={lS}>Meta en</label>
            <div style={{display:"flex",gap:8,marginBottom:10}}>{[["pesos","$ Pesos"],["usd","USD"]].map(([v,l])=>(<button key={v} onClick={()=>setForm({...form,goalType:v})} style={{flex:1,padding:"9px",borderRadius:9,fontWeight:600,fontSize:14,cursor:"pointer",background:form.goalType===v?(form.color||"#10B981"):T.surface2,color:form.goalType===v?"#FFF":T.text2,border:`1px solid ${form.goalType===v?(form.color||"#10B981"):T.border}`}}>{l}</button>))}</div>
            <input type="text" placeholder={form.goalType==="usd"?"Ej: 80000":"Ej: 5600000"} value={form.goalValue} onChange={e=>setForm({...form,goalValue:e.target.value})} style={iBase}/>
            <label style={lS}>Color</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14,marginTop:6}}>{PALETTE.map(c=><div key={c} onClick={()=>setForm({...form,color:c})} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",outline:form.color===c?`2.5px solid ${c}`:"none",outlineOffset:2.5,transform:form.color===c?"scale(1.18)":"scale(1)",transition:"all 0.15s"}}/>)}</div>
            <label style={lS}>Nota (opcional)</label>
            <input type="text" placeholder="Ej: Cambio antes de 2028" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={iBase}/>
            <button onClick={doSave} style={{width:"100%",marginTop:18,padding:13,borderRadius:10,background:form.color||"#10B981",color:"#FFF",border:"none",fontWeight:700,fontSize:15,cursor:"pointer"}}>{modal.type==="add"?"Crear fondo":"Guardar cambios"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// Render
ReactDOM.render(<App />, document.getElementById('app'));
  </script>
</body>
</html>

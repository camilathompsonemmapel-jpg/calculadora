<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Financiero — Cami & Juan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #F1F5F9; color: #0F172A; }
    
    .header {
      background: white;
      border-bottom: 1px solid #E2E8F0;
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-content { max-width: 900px; margin: 0 auto; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
    .title-block h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .title-block p { color: #64748B; font-size: 12px; }
    .tc-input { display: flex; align-items: center; gap: 8px; background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px; padding: 10px; }
    .tc-input span { color: #B45309; font-weight: 700; font-size: 14px; }
    .tc-input input { background: transparent; border: none; outline: none; color: #B45309; font-weight: 700; font-size: 16px; width: 100px; text-align: right; }

    .conversor-section {
      border-top: 1px solid #E2E8F0;
      padding-top: 16px;
      margin-top: 16px;
    }
    .conversor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .conversor-header span { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748B; }
    .conversor-header button { background: transparent; border: 1px solid #E2E8F0; color: #64748B; cursor: pointer; font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 99px; }

    .conversor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .currency-card {
      background: #F1F5F9;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 12px;
    }
    .currency-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .currency-name { display: flex; gap: 6px; align-items: center; font-weight: 700; font-size: 13px; }
    .currency-tc-input {
      display: flex;
      align-items: center;
      gap: 2px;
      background: rgba(0,0,0,0.05);
      border-radius: 6px;
      padding: 2px 6px;
    }
    .currency-tc-input span { font-size: 9px; font-weight: 700; color: #94A3B8; }
    .currency-tc-input input { width: 40px; background: transparent; border: none; outline: none; font-size: 9px; font-weight: 700; color: #64748B; text-align: right; }
    .currency-input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      background: white;
      font-size: 14px;
      margin-bottom: 8px;
      outline: none;
    }
    .currency-result {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 9px;
      padding: 9px 12px;
      min-height: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .currency-result-amount { font-size: 18px; font-weight: 800; }
    .currency-result-desc { font-size: 10px; color: #94A3B8; margin-top: 2px; }
    .currency-empty {
      height: 50px;
      border: 1.5px dashed #E2E8F0;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94A3B8;
      font-size: 11px;
    }

    .content { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
    .funds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .fund-card {
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .fund-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .fund-title { display: flex; gap: 10px; align-items: center; }
    .fund-emoji { font-size: 24px; line-height: 1; }
    .fund-name { font-weight: 700; font-size: 15px; }
    .fund-amount { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .fund-usd { font-size: 12px; color: #64748B; }
    .progress-bar {
      height: 8px;
      border-radius: 99px;
      background: rgba(0,0,0,0.07);
      overflow: hidden;
      margin: 12px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10B981 0%, #10B981 100%);
      border-radius: 99px;
      transition: width 0.8s ease;
    }
    .fund-progress-text { font-size: 11px; color: #64748B; }

    .deposit-btn {
      width: 100%;
      padding: 12px;
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      margin-top: 14px;
    }
    .deposit-btn:hover { background: #F8FAFC; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.14);
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748B; margin: 14px 0 6px; }
    .modal-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      font-size: 15px;
      outline: none;
      margin-bottom: 6px;
    }
    .modal-button {
      width: 100%;
      padding: 13px;
      background: #10B981;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 14px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-content">
      <div class="header-top">
        <div class="title-block">
          <h1 id="total-amount">$0</h1>
          <p>Total en fondos activos</p>
        </div>
        <div class="tc-input">
          <span>$</span>
          <input type="number" id="tc-input" value="1420" />
        </div>
      </div>

      <div class="conversor-section">
        <div class="conversor-header">
          <span>💱 Conversor rápido</span>
          <button id="conversor-toggle">Ocultar ▲</button>
        </div>
        <div class="conversor-grid" id="conversor-grid"></div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="funds-grid" id="funds-grid"></div>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-content">
      <h2 class="modal-title" id="modal-title"></h2>
      <label class="modal-label">Monto a agregar ($)</label>
      <input type="text" id="modal-amount" class="modal-input" placeholder="Ej: 150000" />
      <button class="modal-button" id="modal-save">Agregar</button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════════════════════
    //  CONFIG
    // ════════════════════════════════════════════════════════════════
    const COLORS = {
      USD: "#10B981",
      EUR: "#0EA5E9",
      BRL: "#F59E0B",
      PYG: "#8B5CF6"
    };

    const CURRENCIES = [
      { key: "USD", flag: "🇺🇸", name: "Dólar", sym: "USD", default: 1420 },
      { key: "EUR", flag: "🇪🇺", name: "Euro", sym: "EUR", default: 1560 },
      { key: "BRL", flag: "🇧🇷", name: "Real", sym: "BRL", default: 265 },
      { key: "PYG", flag: "🇵🇾", name: "Guaraní", sym: "PYG", default: 0.19 }
    ];

    const DEFAULT_FUNDS = [
      { id: 1, name: "Casita", emoji: "🏠", amount: 640000 },
      { id: 2, name: "Auto", emoji: "🚗", amount: 0 },
      { id: 3, name: "Viaje 2026", emoji: "✈️", amount: 1282645 },
      { id: 4, name: "Emergencia", emoji: "🛡️", amount: 0 }
    ];

    // ════════════════════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════════════════════
    let funds = [];
    let rates = {};
    let conversorOpen = true;

    // Load from localStorage
    function loadData() {
      const saved = localStorage.getItem("cami_funds");
      funds = saved ? JSON.parse(saved) : DEFAULT_FUNDS;

      CURRENCIES.forEach(c => {
        const tc = localStorage.getItem(`tc_${c.key}`);
        rates[c.key] = tc ? parseFloat(tc) : c.default;
      });
    }

    function saveData() {
      localStorage.setItem("cami_funds", JSON.stringify(funds));
      CURRENCIES.forEach(c => {
        localStorage.setItem(`tc_${c.key}`, rates[c.key]);
      });
    }

    // ════════════════════════════════════════════════════════════════
    //  RENDER
    // ════════════════════════════════════════════════════════════════
    function render() {
      renderFunds();
      renderConversor();
      updateTotal();
    }

    function updateTotal() {
      const total = funds.reduce((s, f) => s + f.amount, 0);
      document.getElementById("total-amount").textContent = "$" + Math.round(total).toLocaleString("es-AR");
    }

    function renderFunds() {
      const grid = document.getElementById("funds-grid");
      grid.innerHTML = funds.map(f => `
        <div class="fund-card">
          <div class="fund-header">
            <div class="fund-title">
              <span class="fund-emoji">${f.emoji}</span>
              <div>
                <div class="fund-name">${f.name}</div>
              </div>
            </div>
          </div>
          <div class="fund-amount">${"$" + Math.round(f.amount).toLocaleString("es-AR")}</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: 50%"></div>
          </div>
          <button class="deposit-btn" onclick="openModal(${f.id}, '${f.name}', '${f.emoji}')">+ Depositar</button>
        </div>
      `).join("");
    }

    function renderConversor() {
      const grid = document.getElementById("conversor-grid");
      grid.innerHTML = CURRENCIES.map(c => {
        const tc = rates[c.key];
        return `
          <div class="currency-card">
            <div class="currency-header">
              <div class="currency-name">
                <span>${c.flag}</span>
                <span>${c.name}</span>
              </div>
              <div class="currency-tc-input">
                <span>$</span>
                <input
                  type="number"
                  id="tc-${c.key}"
                  value="${tc}"
                  onchange="updateTC('${c.key}')"
                  step="${c.key === 'PYG' ? '0.01' : '1'}"
                />
                <span>/${c.sym}</span>
              </div>
            </div>
            <input
              type="text"
              class="currency-input"
              placeholder="Importe..."
              oninput="updateConversor('${c.key}')"
              id="input-${c.key}"
            />
            <div class="currency-result" id="result-${c.key}">
              <div class="currency-empty">Ingresá un importe</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function updateTC(key) {
      const tcInput = document.getElementById(`tc-${key}`);
      const newTC = parseFloat(tcInput.value) || rates[key];
      rates[key] = newTC;
      saveData();
      updateConversor(key);
    }

    function updateConversor(key) {
      const input = document.getElementById(`input-${key}`);
      const result = document.getElementById(`result-${key}`);
      const amount = parseFloat(input.value.replace(/\./g, "").replace(",", ".")) || 0;

      if (amount > 0) {
        const pesos = amount * rates[key];
        result.innerHTML = `
          <div class="currency-result-amount">$${Math.round(pesos).toLocaleString("es-AR")}</div>
          <div class="currency-result-desc">${amount.toLocaleString("es-AR")} × $${rates[key].toFixed(rates[key] < 1 ? 4 : 0)}</div>
        `;
      } else {
        result.innerHTML = `<div class="currency-empty">Ingresá un importe</div>`;
      }
    }

    // ════════════════════════════════════════════════════════════════
    //  MODAL
    // ════════════════════════════════════════════════════════════════
    let currentFundId = null;

    function openModal(fundId, name, emoji) {
      currentFundId = fundId;
      document.getElementById("modal-title").textContent = `${emoji} ${name}`;
      document.getElementById("modal-amount").value = "";
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modal-amount").focus();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function saveDeposit() {
      const amount = parseFloat(document.getElementById("modal-amount").value.replace(/\./g, "").replace(",", ".")) || 0;
      if (amount > 0) {
        const fund = funds.find(f => f.id === currentFundId);
        if (fund) {
          fund.amount += amount;
          saveData();
          render();
          closeModal();
        }
      }
    }

    // ════════════════════════════════════════════════════════════════
    //  EVENT LISTENERS
    // ════════════════════════════════════════════════════════════════
    document.addEventListener("DOMContentLoaded", () => {
      loadData();
      render();

      document.getElementById("tc-input").addEventListener("change", (e) => {
        rates.USD = parseFloat(e.target.value) || 1420;
        saveData();
        render();
      });

      document.getElementById("conversor-toggle").addEventListener("click", () => {
        conversorOpen = !conversorOpen;
        const grid = document.getElementById("conversor-grid");
        if (conversorOpen) {
          grid.classList.remove("hidden");
          document.getElementById("conversor-toggle").textContent = "Ocultar ▲";
        } else {
          grid.classList.add("hidden");
          document.getElementById("conversor-toggle").textContent = "Mostrar ▼";
        }
      });

      document.getElementById("modal-save").addEventListener("click", saveDeposit);
      document.getElementById("modal-amount").addEventListener("keypress", (e) => {
        if (e.key === "Enter") saveDeposit();
      });

      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal")) closeModal();
      });
    });
  </script>

</body>
</html>
